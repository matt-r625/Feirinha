<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Feiras</h2>
  <a routerLink="/feiras/nova" class="btn btn-primary">+ Cadastrar nova feira</a>
</div>

<table class="table table-striped table-bordered">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Descricao</th>
      <th>Tipo</th>
      <th>Acao</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let feira of feiras">
      <td>{{ feira.id }}</td>
      <td>{{ feira.nome }}</td>
      <td>{{ feira.descricao }}</td>
      <td>{{ feira.tipoFeira?.nome }}</td>
      <td>
        <button class="btn btn-danger btn-sm" (click)="deletarFeira(feira.id)">Deletar</button>
      </td>
    </tr>
  </tbody>
</table>
