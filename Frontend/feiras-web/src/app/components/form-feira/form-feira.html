<h2 class="mb-3">Cadastro de Feira</h2>
<form (ngSubmit)="salvarFeira()" class="col-lg-6">
  <div class="mb-3">
    <label class="form-label">Nome:</label>
    <input type="text" [(ngModel)]="nome" name="nome" required class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Descricao:</label>
    <input type="text" [(ngModel)]="descricao" name="descricao" required class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Tipo:</label>
    <select [(ngModel)]="tipoFeiraId" name="tipoFeiraId" required class="form-select">
      <option value="">Selecione...</option>
      <option *ngFor="let tipo of tipoFeira" [value]="tipo.id">
        {{ tipo.nome }}
      </option>
    </select>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">Cadastrar</button>
    <a routerLink="/feiras" class="btn btn-secondary">Cancelar</a>
  </div>
</form>

<p *ngIf="mensagem">{{ mensagem }}</p>
